<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="SF apartment hunting — every building on one map. Mark yes or no.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <title>Vacancies · SF</title>

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
  <header class="topbar">
    <h1>Vacancies</h1>
    <div class="counts" id="counts"></div>
  </header>
  <nav class="filter-bar" id="filterBar" aria-label="Filter buildings"></nav>
  <main class="map-wrap" aria-label="Map of buildings">
    <div id="map"></div>
    <button class="map-locate" id="locateMe" type="button" aria-label="Show my location">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="3"></circle>
        <line x1="12" y1="2" x2="12" y2="5"></line>
        <line x1="12" y1="19" x2="12" y2="22"></line>
        <line x1="2" y1="12" x2="5" y2="12"></line>
        <line x1="19" y1="12" x2="22" y2="12"></line>
        <circle cx="12" cy="12" r="8" fill="none"></circle>
      </svg>
    </button>
  </main>
  <div class="resize-handle" id="resizeHandle" role="separator" aria-orientation="horizontal" aria-label="Resize map and list" tabindex="0">
    <span class="resize-handle-grip" aria-hidden="true"></span>
  </div>
  <section class="building-list" aria-label="Buildings">
    <div class="list-header">
      <h2>Buildings</h2>
      <span id="listSummary"></span>
    </div>
    <div class="building-rows" id="buildingRows"></div>
  </section>
  <div id="buildingDetailRoot" aria-hidden="true"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
