<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="SF apartment hunting — every building on one map. Mark yes or no.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <title>Vacancies · SF</title>

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
  <header class="topbar">
    <h1>Vacancies</h1>
    <div class="counts" id="counts"></div>
  </header>
  <nav class="filters" id="filters" aria-label="Filter buildings"></nav>
  <main id="map" aria-label="Map of buildings"></main>
  <section class="building-list" aria-label="Buildings">
    <div class="list-header">
      <h2>Buildings</h2>
      <span id="listSummary"></span>
    </div>
    <div class="building-rows" id="buildingRows"></div>
  </section>
  <div id="buildingDetailRoot" aria-hidden="true"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
